<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>520爱心便签</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #000;
  overflow: hidden;
  height: 100vh;
  font-family: sans-serif;
}
.note {
  position: absolute;
  padding: 12px 10px;
  border-radius: 8px;
  width: 110px;
  min-height: 90px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 14px;
  font-weight: bold;
  color: #222;
  z-index: 10;
  opacity: 0;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  transition: all 1.8s cubic-bezier(0.22, 1, 0.36, 1);
}
</style>
</head>
<body>

<script>
// 点开直接全屏
(async function autoFull() {
  try {
    const d = document.documentElement;
    if (d.requestFullscreen) await d.requestFullscreen();
    else if (d.webkitRequestFullscreen) await d.webkitRequestFullscreen();
    else if (d.msRequestFullscreen) await d.msRequestFullscreen();
  } catch (e) {}
})();

const texts = [
  "好好吃饭", "别熬夜", "天天开心", "照顾好自己",
  "要开心呀", "万事顺意", "平安喜乐", "岁岁无忧",
  "记得微笑", "少点烦恼", "保持热爱", "永远幸福",
  "岁岁平安", "万事胜意", "温柔以待", "不负遇见"
];

const colors = [
  "#ffd166", "#06d6a0", "#118ab2", "#ef476f", "#ffadad",
  "#ffd6a5", "#fdffb6", "#caffbf", "#9bf6ff", "#bdb2ff"
];

// 更大、更均匀的爱心轮廓
function getHeartList(count) {
  let list = [];
  for (let i = 0; i < count; i++) {
    let t = Math.random() * Math.PI * 2;
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
    list.push({ x: x * 18, y: y * 18 }); // 放大爱心
  }
  // 按距离中心排序，从内向外流动出现
  list.sort((a, b) => Math.hypot(a.x, a.y) - Math.hypot(b.x, b.y));
  return list;
}

function rand(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

const cx = window.innerWidth / 2;
const cy = window.innerHeight / 2;
const total = 70;
const points = getHeartList(total);
const notes = [];

// 1. 从中心流动依次拼成爱心（3秒左右）
for (let i = 0; i < total; i++) {
  const div = document.createElement("div");
  div.classList.add("note");
  div.style.background = rand(colors);
  div.innerText = rand(texts);
  document.body.appendChild(div);
  notes.push(div);

  setTimeout(() => {
    div.style.opacity = 1;
    div.style.transform = "translate(-50%, -50%) scale(1)";
    div.style.left = cx + points[i].x + "px";
    div.style.top = cy + points[i].y + "px";
  }, i * 40);
}

// 2. 心跳跳动 2 次
setTimeout(() => {
  notes.forEach(n => {
    n.style.transition = "transform 0.3s ease-in-out";
    n.style.transform = "translate(-50%, -50%) scale(1.15)";
    setTimeout(() => {
      n.style.transform = "translate(-50%, -50%) scale(1)";
      setTimeout(() => {
        n.style.transform = "translate(-50%, -50%) scale(1.15)";
        setTimeout(() => {
          n.style.transform = "translate(-50%, -50%) scale(1)";
          // 跳完恢复顺滑动画
          setTimeout(() => {
            n.style.transition = "all 1.9s cubic-bezier(0.22,1,0.36,1)";
          }, 300);
        }, 300);
      }, 300);
    }, 300);
  });

  // 3. 心跳结束 → 流动散开铺满全屏
  setTimeout(() => {
    notes.forEach(n => {
      n.style.left = (60 + Math.random() * (window.innerWidth - 120)) + "px";
      n.style.top = (60 + Math.random() * (window.innerHeight - 120)) + "px";
    });

    // 额外再补一批便签更饱满
    setTimeout(() => {
      for (let i = 0; i < 40; i++) {
        const d = document.createElement("div");
        d.classList.add("note");
        d.style.background = rand(colors);
        d.innerText = rand(texts);
        d.style.opacity = 1;
        d.style.left = 60 + Math.random() * (window.innerWidth - 120) + "px";
        d.style.top = 60 + Math.random() * (window.innerHeight - 120) + "px";
        d.style.transform = "translate(-50%, -50%) scale(1)";
        document.body.appendChild(d);
      }
    }, 1200);
  }, 1500);
}, 3000);
</script>
</body>
</html>
